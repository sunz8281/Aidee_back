server:
  port: 8080

logging:
  level:
    com.aidee.backend.ai: DEBUG
    com.aidee.backend.agent: INFO
    com.aidee.backend.meeting: INFO

spring:
  application:
    name: backend
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  upload:
    dir: ./uploads
  oauth2:
    redirect-url: ${OAUTH2_REDIRECT_URL:http://localhost:3000}
    cookie-secure: ${OAUTH2_COOKIE_SECURE:false}

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000
  refresh-expiration: 2592000000

gemini:
  api-key: ${GEMINI_API_KEY}
  text-model: ${GEMINI_TEXT_MODEL:gemini-2.5-flash}

clova:
  speech:
    invoke-url: ${CLOVA_SPEECH_INVOKE_URL}
    secret: ${CLOVA_SPEECH_SECRET}
    realtime:
      grpc-url: ${CLOVA_SPEECH_REALTIME_GRPC_URL}
      secret: ${CLOVA_SPEECH_REALTIME_SECRET}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}
