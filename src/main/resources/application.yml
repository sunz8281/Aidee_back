server:
  port: 8080

logging:
  level:
    com.aidee.backend.ai: DEBUG
    com.aidee.backend.agent: INFO
    com.aidee.backend.meeting: INFO

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  upload:
    dir: ./uploads

gemini:
  api-key: ${GEMINI_API_KEY}

clova:
  speech:
    secret: ${CLOVA_SPEECH_SECRET}

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}
